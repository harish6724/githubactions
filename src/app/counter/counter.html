<div class="counter-card glass-card">
  <div class="counter-label">Counter</div>

  <div class="count-display">
    <span class="count-value" [class.bump]="bumping">{{ count }}</span>
  </div>

  <div class="button-row">
    <button class="btn btn-ghost" (click)="decrement()" aria-label="Decrement">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <button class="btn btn-outline" (click)="reset()">Reset</button>

    <button class="btn btn-primary" (click)="increment()" aria-label="Increment">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="counter-hint">Click + or − to change the value</div>
</div>
