# .github/workflows/ci.yml
#
# PURPOSE: Pull-request gate — every PR targeting main must pass lint,
#          tests, and build before the merge button is enabled.
#
# HOW TO ENFORCE: Repo Settings -> Branches -> Add rule for "main":
#   - Check "Require status checks to pass before merging"
#   - Search for and select the "CI / Lint, Test, Build" check
#   - Enable "Require branches to be up to date before merging"

name: CI

on:
  pull_request:
    branches: [ main ]
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch:

# Cancel any in-flight run for the same PR when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node 24.x (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          # Cache ~/.npm keyed on package-lock.json hash — speeds up installs
          cache: 'npm'

      - name: Install dependencies (lockfile-strict)
        # Use `npm ci` not `npm install` — it fails if lock file is out of sync
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        # Vitest auto-detects the CI environment variable set by GitHub Actions
        # and runs once (no watch mode) without opening a browser window.
        run: npm run test:ci

      - name: Build (production)
        run: npm run build -- --configuration production

      # ── Secrets demonstration ─────────────────────────────────────────────
      # To add the secret: Repo -> Settings -> Secrets and variables -> Actions
      #   -> New repository secret -> Name: DEMO_API_KEY, Value: any string
      #
      # NEVER echo a secret directly. Instead reference it via an env var and
      # check its presence — GitHub masks the value as *** in logs anyway, but
      # echoing it is still bad practice.
      - name: Demonstrate secret access
        env:
          DEMO_API_KEY: ${{ secrets.DEMO_API_KEY }}
        run: |
          if [ -z "$DEMO_API_KEY" ]; then
            echo "INFO: DEMO_API_KEY is not set. Add it under repo Settings -> Secrets."
          else
            echo "DEMO_API_KEY is present. Length=${#DEMO_API_KEY} chars (value is masked)."
          fi
